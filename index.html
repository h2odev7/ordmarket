<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OrdMarket Live</title>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<style>
body{background:#0b0b0b;color:#fff;font-family:sans-serif;padding:20px}
button{padding:10px 16px;border:none;border-radius:6px;cursor:pointer;margin-top:5px}
.card{background:#111;padding:12px;margin:10px 0;border-radius:8px}
</style>
</head>
<body>

<h2>OrdMarket (Production Ready Base)</h2>

<button onclick="connectWallet()">Connect UniSat</button>
<p id="wallet"></p>

<hr>

<h3>Live Ordinals</h3>
<div id="collections"></div>

<hr>

<h3>Listings</h3>
<div id="listings"></div>

<script>
let wallet = null;

async function connectWallet(){
  if(!window.unisat) return alert("Install UniSat");
  const acc = await window.unisat.requestAccounts();
  wallet = acc[0];
  document.getElementById("wallet").innerText = "Connected: " + wallet;
}

async function loadCollections(){
  const res = await axios.get("https://api.hiro.so/ordinals/v1/inscriptions?limit=10");
  const data = res.data.results;

  document.getElementById("collections").innerHTML = data.map(i=>`
    <div class="card">
      Inscription #${i.number}
      <button onclick="loadListings('${i.id}')">View Listings</button>
    </div>
  `).join("");
}

function loadListings(id){
  const listings = [
    {price:0.0005,id},
    {price:0.0008,id}
  ];

  document.getElementById("listings").innerHTML = listings.map(l=>`
    <div class="card">
      ${l.price} BTC
      <button onclick="buy('${l.id}',${l.price})">Buy</button>
    </div>
  `).join("");
}

async function buy(id,price){
  if(!wallet) return alert("Connect wallet");

  const psbtRes = await axios.post("http://localhost:3000/create-psbt",{
    inscriptionId:id,
    buyer:wallet,
    price
  });

  const signed = await window.unisat.signPsbt(psbtRes.data.psbt);
  const txid = await window.unisat.pushPsbt(signed);

  alert("Success: "+txid);
}

loadCollections();
</script>

</body>
</html>
